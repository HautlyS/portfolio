<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Guardians x SOS Águas da Prata</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet">
    <style>
        :root {
            --amoled: #000000;
            --silver: #e0e0e0;
            --chrome: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --aqueous: #00f2ff;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--amoled); 
            color: var(--silver); 
            font-family: var(--font-main);
            overflow-x: hidden;
            cursor: none;
        }

        /* Argent Aqueous Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* Header & Logo */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sos-title {
            font-family: var(--font-mono);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--aqueous);
            border-left: 3px solid var(--aqueous);
            padding-left: 15px;
        }

        .logo-main {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            mix-blend-mode: lighten;
        }

        .nav-links {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Sections */
        section {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10vw;
            z-index: 2;
        }

        .hero-text {
            font-size: clamp(3rem, 10vw, 12rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-align: center;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }

        .sub-data {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--aqueous);
            margin-top: 20px;
            opacity: 0.6;
        }

        /* Project Nodes */
        .project-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            pointer-events: none;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            opacity: 0;
            transform: translateY(50px);
        }

        .project-card.right { align-items: flex-end; text-align: right; }

        .tag {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .project-title {
            font-size: 2.5rem;
            font-weight: 300;
            max-width: 300px;
        }

        /* Scroll Progress */
        .scroll-indicator {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            height: 200px;
            width: 1px;
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }
        .scroll-bar {
            width: 100%;
            background: var(--aqueous);
            height: 0%;
        }

        /* Confluence Overlay */
        .liquid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, var(--amoled) 100%);
            z-index: 1;
            pointer-events: none;
        }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 8px;
            opacity: 0.4;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="liquid-overlay"></div>
    <div id="canvas-container"></div>

    <header>
        <div class="header-left">
            <div class="sos-title">SOS ÁGUAS DA PRATA</div>
            <img src="https://images.squarespace-cdn.com/content/v1/5e66bef295469c229eeb5cfc/1584225761902-0O1QA5X2DW2MYSOWUMJZ/logo+now+white.png?format=1500w" alt="Logo" class="logo-main">
        </div>
        <div class="nav-links">Join forces // SIGN IN</div>


    </header>

    <div class="scroll-indicator">
        <div class="scroll-bar"></div>
    </div>

    <section id="hero">
        <h1 class="hero-text">EARTH GUARDIANS BR</h1>
        <div class="sub-data">12 YEARS OF RESISTENCE, ART AND WORK</div>
    </section>

    <section id="footer-trigger">
        <h1 class="hero-text" style="font-size: 5vw;">CHOOSE ACTION NOW!</h1>
        <div class="sub-data">We won’t wait, it’s our future, we decide. </div>
    </section>

    <footer>JOIN THE MOVEMENT | FIGHT AGAINST CLIMATE CRISES IN YOUR COMMUNITY</footer>

    <script>
        // GSAP Setup
        gsap.registerPlugin(ScrollTrigger);

        // Three.js 4D Earth World
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Earth Geometry (Argent / Chrome Aesthetic)
        const geometry = new THREE.IcosahedronGeometry(2, 15);
        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.015,
            transparent: true,
            opacity: 0.8
        });

        // Add "Liquid" wireframe
        const wireframeGeom = new THREE.IcosahedronGeometry(2.02, 3);
        const wireMaterial = new THREE.MeshBasicMaterial({
            color: 0x00f2ff,
            wireframe: true,
            transparent: true,
            opacity: 0.05
        });
        const wireSphere = new THREE.Mesh(wireframeGeom, wireMaterial);
        scene.add(wireSphere);

        const sphere = new THREE.Points(geometry, material);
        scene.add(sphere);

        camera.position.z = 5;

        // Custom Cursor
        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.6, ease: "power3.out" });
        });

        // Scroll Animations
        gsap.to(sphere.rotation, {
            y: Math.PI * 2,
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 2
            }
        });

        gsap.to(sphere.scale, {
            x: 1.5, y: 1.5, z: 1.5,
            scrollTrigger: {
                trigger: "#footer-trigger",
                start: "top bottom",
                end: "bottom top",
                scrub: 1
            }
        });

        // Scroll Progress Bar
        gsap.to(".scroll-bar", {
            height: "100%",
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 0.3
            }
        });

        // Argent Confluence Distortion
        const positions = geometry.attributes.position.array;
        const originalPositions = new Float32Array(positions);

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            for(let i = 0; i < positions.length; i += 3) {
                const x = originalPositions[i];
                const y = originalPositions[i+1];
                const z = originalPositions[i+2];
                
                // Aqueous displacement effect
                const noise = Math.sin(x + time) * 0.1 + Math.cos(y + time) * 0.1;
                positions[i] = x + noise;
                positions[i+1] = y + noise;
                positions[i+2] = z + noise;
            }
            geometry.attributes.position.needsUpdate = true;
            
            sphere.rotation.x += 0.001;
            wireSphere.rotation.y -= 0.002;
            
            renderer.render(scene, camera);
        }

        animate();

        // Responsive resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Reveal Hero
        gsap.from(".hero-text", {
            duration: 2,
            y: 100,
            opacity: 0,
            ease: "expo.out",
            stagger: 0.2
        });
    </script>
</body>
</html>
