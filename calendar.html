<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER CALENDAR // OPENSOURCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #00FF85;
            --muted: #1a1a1a;
            --border: 2px solid #00FF85;
            --border-dim: 1px solid #00FF85;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0 !important;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--accent);
            margin: 10px;
        }

        /* UTILITY */
        .flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .align-center { align-items: center; }
        .p-1 { padding: 1rem; }
        .m-t-1 { margin-top: 1rem; }
        .pointer { cursor: pointer; }

        /* HEADER */
        header {
            border-bottom: var(--border);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            background: transparent;
            color: var(--accent);
            border: var(--border);
            padding: 8px 16px;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent);
            color: #000;
        }

        button:active {
            transform: translate(2px, 2px);
        }

        button.active {
            background: var(--accent);
            color: #000;
        }

        /* GRID SYSTEM */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
            height: 100%;
        }

        .day-label {
            border-bottom: var(--border);
            border-right: var(--border-dim);
            padding: 10px;
            text-align: right;
            font-weight: 700;
            background: #050505;
        }

        .day-cell {
            border-right: var(--border-dim);
            border-bottom: var(--border-dim);
            min-height: 120px;
            padding: 10px;
            position: relative;
            transition: background 0.2s;
        }

        .day-cell:hover {
            background: #0a0a0a;
        }

        .day-cell.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 10px;
            display: block;
        }

        /* EVENTS */
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-item {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 4px 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .event-item:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            color: #000;
        }

        /* WEEK VIEW SPECIFIC */
        .week-view {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            height: 100%;
        }

        .time-col {
            border-right: var(--border);
            display: flex;
            flex-direction: column;
        }

        .time-slot {
            height: 60px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.6rem;
            padding: 2px;
            opacity: 0.5;
        }

        /* OVERLAYS */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 10px solid var(--accent);
        }

        .status-bar {
            border-top: var(--border);
            padding: 5px 20px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            background: var(--accent);
            color: #000;
        }

        .hidden { display: none !important; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="font-size: 4rem; margin-bottom: 2rem;">CYBER CALENDAR</h1>
        <p style="margin-bottom: 2rem; max-width: 400px; text-align: center;">SECURE OAUTH2 PROTOCOL REQUIRED. CONNECT TO GOOGLE CLOUD TO SYNC DATA.</p>
        <button id="login-btn" style="font-size: 1.5rem; padding: 20px 40px;">[ INITIALIZE_CONNECTION ]</button>
    </div>

    <header>
        <div class="brand">GRID_v1.0.4 // <span id="current-month-display">MAY 2024</span></div>
        <div class="controls">
            <button onclick="changeMonth(-1)">&lt; PREV</button>
            <button id="month-toggle" class="active" onclick="setView('month')">MONTH</button>
            <button id="week-toggle" onclick="setView('week')">WEEK</button>
            <button onclick="changeMonth(1)">NEXT &gt;</button>
        </div>
        <div style="text-align: right;">
            <button onclick="logout()">DISCONNECT</button>
        </div>
    </header>

    <main id="calendar-root">
        <!-- Calendar injected here -->
    </main>

    <div class="status-bar">
        <span>STATUS: CONNECTED // PRIMARY_CALENDAR</span>
        <span id="clock">00:00:00</span>
        <span>UI_ENGINE: MONOLITHIC_BRUTALIST</span>
    </div>

    <script>
        // STATE MANAGEMENT
        let state = {
            view: 'month',
            currentDate: new Date(),
            events: JSON.parse(localStorage.getItem('monolith_events')) || [
                { id: 1, title: 'SYSTEM RECOVERY', date: new Date().toISOString().split('T')[0] },
                { id: 2, title: 'DATA OVERHAUL', date: new Date().toISOString().split('T')[0] }
            ],
            isConnected: false
        };

        const root = document.getElementById('calendar-root');
        const monthDisplay = document.getElementById('current-month-display');

        // MOCK OAUTH2
        document.getElementById('login-btn').addEventListener('click', () => {
            const btn = document.getElementById('login-btn');
            btn.innerText = "AUTHENTICATING...";
            setTimeout(() => {
                state.isConnected = true;
                document.getElementById('auth-overlay').classList.add('hidden');
                render();
            }, 1200);
        });

        function logout() {
            state.isConnected = false;
            document.getElementById('auth-overlay').classList.remove('hidden');
            document.getElementById('login-btn').innerText = "[ INITIALIZE_CONNECTION ]";
        }

        // NAVIGATION
        function setView(view) {
            state.view = view;
            document.getElementById('month-toggle').classList.toggle('active', view === 'month');
            document.getElementById('week-toggle').classList.toggle('active', view === 'week');
            render();
        }

        function changeMonth(offset) {
            state.currentDate.setMonth(state.currentDate.getMonth() + offset);
            render();
        }

        // CORE LOGIC
        function render() {
            root.innerHTML = '';
            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            
            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            monthDisplay.innerText = `${monthNames[month]} ${year}`;

            if (state.view === 'month') {
                renderMonth(year, month);
            } else {
                renderWeek();
            }
        }

        function renderMonth(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Header Labels
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            
            days.forEach(d => {
                const label = document.createElement('div');
                label.className = 'day-label';
                label.innerText = d;
                grid.appendChild(label);
            });

            // Empty cells for padding
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell other-month';
                grid.appendChild(empty);
            }

            // Actual days
            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                cell.innerHTML = `<span class="day-number">${d}</span>`;
                cell.onclick = (e) => {
                    if(e.target === cell || e.target.classList.contains('day-number')) addEvent(dateStr);
                };

                const list = document.createElement('div');
                list.className = 'event-list';
                
                state.events.filter(e => e.date === dateStr).forEach(ev => {
                    const item = document.createElement('div');
                    item.className = 'event-item';
                    item.innerText = ev.title;
                    item.onclick = (e) => {
                        e.stopPropagation();
                        deleteEvent(ev.id);
                    };
                    list.appendChild(item);
                });

                cell.appendChild(list);
                grid.appendChild(cell);
            }

            root.appendChild(grid);
        }

        function renderWeek() {
            const container = document.createElement('div');
            container.className = 'week-view';
            
            // Time Column
            const timeCol = document.createElement('div');
            timeCol.className = 'time-col';
            for(let i = 0; i < 24; i++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.innerText = `${String(i).padStart(2, '0')}:00`;
                timeCol.appendChild(slot);
            }
            container.appendChild(timeCol);

            // Week Columns
            const today = state.currentDate;
            const dayOfWeek = today.getDay();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - dayOfWeek);

            for(let i = 0; i < 7; i++) {
                const day = new Date(startOfWeek);
                day.setDate(startOfWeek.getDate() + i);
                const dateStr = day.toISOString().split('T')[0];

                const col = document.createElement('div');
                col.className = 'day-cell';
                col.style.flexDirection = 'column';
                col.innerHTML = `<span class="day-number" style="border-bottom: var(--border-dim); padding-bottom: 5px;">${day.getDate()} ${['SUN','MON','TUE','WED','THU','FRI','SAT'][i]}</span>`;
                
                const list = document.createElement('div');
                list.className = 'event-list';
                list.style.marginTop = '10px';

                state.events.filter(e => e.date === dateStr).forEach(ev => {
                    const item = document.createElement('div');
                    item.className = 'event-item';
                    item.innerText = ev.title;
                    item.onclick = () => deleteEvent(ev.id);
                    list.appendChild(item);
                });

                col.onclick = () => addEvent(dateStr);
                col.appendChild(list);
                container.appendChild(col);
            }
            root.appendChild(container);
        }

        // ACTIONS
        function addEvent(date) {
            const title = prompt("NEW_ENTRY_TITLE:");
            if (title) {
                state.events.push({
                    id: Date.now(),
                    title: title.toUpperCase(),
                    date: date
                });
                save();
                render();
            }
        }

        function deleteEvent(id) {
            if(confirm("CONFIRM_ENTRY_DELETION?")) {
                state.events = state.events.filter(e => e.id !== id);
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem('monolith_events', JSON.stringify(state.events));
        }

        // CLOCK
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // INIT
        // (Rendering is triggered by login or default state)
    </script>
</body>
</html>
